deptrac:
  paths:
    - ./src
  layers:
    # MVC Layers
    - name: MVC_Command
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\Command\\.*
    - name: MVC_Controller
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\Controller\\.*
    - name: MVC_Entity
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\Entity\\.*
    - name: MVC_Form
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\Form\\[^\\]*$
    - name: MVC_FormOptions
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\Form\\Options\\.*
    - name: MVC_Repository
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\Repository\\.*
    - name: MVC_Service
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\(Service|Assets|Fixtures|Twig)\\.*
    - name: MVC_Step
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\Step\\.*
    - name: MVC_Ui
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\Ui\\.*
    - name: MVC_Validator
      collectors:
        - type: classLike
          value: Spipu\\[^\\]*\\Validator\\.*

  ruleset:
    # MVC
    MVC_Command:
      - MVC_Entity
      - MVC_Repository
      - MVC_Service
      - MVC_FormOptions
    MVC_Controller:
      - MVC_Entity
      - MVC_Repository
      - MVC_Service
      - MVC_Ui
      - MVC_Form
      - MVC_FormOptions
      - MVC_Validator
    MVC_Entity:
      - MVC_Validator
      - MVC_FormOptions
    MVC_Form:
      - MVC_Entity
      - MVC_FormOptions
      - MVC_Repository
      - MVC_Service
    MVC_FormOptions:
      - MVC_Entity
      - MVC_Repository
      - MVC_Service
    MVC_Repository:
      - MVC_Entity
    MVC_Service:
      - MVC_Entity
      - MVC_Repository
      - MVC_FormOptions
      - MVC_Form
    MVC_Step:
      - MVC_Service
      - MVC_Entity
      - MVC_Repository
      - MVC_FormOptions
    MVC_Ui:
      - MVC_Entity
      - MVC_FormOptions
      - MVC_Repository
      - MVC_Service
    MVC_Validator:
      - MVC_Repository

  skip_violations:
    Spipu\ProcessBundle\Entity\Process\Step:
      - Spipu\ProcessBundle\Step\StepInterface
    Spipu\ProcessBundle\Service\ConfigReader:
      - Spipu\ProcessBundle\Step\StepInterface
    Spipu\ProcessBundle\Service\ReportManager:
      - Spipu\ProcessBundle\Step\StepInterface
      - Spipu\ProcessBundle\Step\StepReportInterface
    Spipu\UserBundle\Repository\UserRepository:
      - Spipu\UserBundle\Service\ModuleConfigurationInterface
    Spipu\ProcessBundle\Repository\LogRepository:
      - Spipu\ProcessBundle\Service\Status
    Spipu\ProcessBundle\Repository\TaskRepository:
      - Spipu\ProcessBundle\Service\Status

  formatters:
    graphviz:
      point_to_groups: true
      groups: []
      hidden_layers: []
